  const el = id => document.getElementById(id);

  const genGradeSelect = el("genGradeSelect");
  const genScenarioSelect = el("genScenarioSelect");
  const genThemeSelect = el("genThemeSelect");
  const competencesPreview = el("competencesPreview");
  const speakerA = el("speakerA");
  const speakerB = el("speakerB");
  const turnsRange = el("turnsRange");
  const turnsValue = el("turnsValue");
  const generateBtn = el("generateBtn");

  const outputCard = el("outputCard");
  const regenerateBtn = el("regenerateBtn");
  const copyBtn = el("copyBtn");
  const resetBtn = el("resetBtn");
  const errorBanner = el("errorBanner");

  let programs = {};      // gradeId -> [{scenario, theme, communicativeCompetences}]
  let currentCompetences = "";
  let lastDialogue = null;

  // ---------- generic helpers ----------

  function showError(msg){
    errorBanner.textContent = msg;
    errorBanner.hidden = false;
    setTimeout(() => { errorBanner.hidden = true; }, 8000);
  }

  function gradeLabel(id){
    const g = GRADES.find(g => g.id === id);
    return g ? g.label : id;
  }

  function cleanJsonText(text){
    return text.replace(/```json/gi, "").replace(/```/g, "").trim();
  }

  function safeParseJson(text){
    const cleaned = cleanJsonText(text);
    try{ return JSON.parse(cleaned); }
    catch(e){
      const match = cleaned.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
      if(match){
        try{ return JSON.parse(match[0]); }catch(e2){ /* fall through */ }
      }
      throw new Error("No se pudo interpretar la respuesta de la IA.");
    }
  }

  async function callClaude(system, userText, maxTokens){
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: maxTokens || 1000,
        system: system,
        messages: [{ role: "user", content: userText }]
      })
    });
    if(!response.ok) throw new Error("Error de conexión con la IA (" + response.status + ").");
    const data = await response.json();
    const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
    if(!text) throw new Error("La IA no devolvió contenido.");
    return text;
  }

  // ---------- programs: loaded from built-in factory data (no upload needed) ----------

  function initPrograms(){
    GRADES.forEach(g => {
      const entries = BUILTIN_PROGRAMS[g.id] || [];
      // clone so nothing here can accidentally mutate the built-in factory data
      programs[g.id] = entries.map(e => ({
        scenario: e.scenario || "",
        theme: e.theme || "",
        communicativeCompetences: e.communicativeCompetences || ""
      }));
    });
    populateGenGradeSelect();
  }

  // ---------- generate section: cascading selects ----------

  function populateGenGradeSelect(){
    const gradesWithData = GRADES.filter(g => (programs[g.id] || []).length > 0);
    const previousValue = genGradeSelect.value;

    genGradeSelect.innerHTML = "";
    if(gradesWithData.length === 0){
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "— Sube un programa primero —";
      genGradeSelect.appendChild(opt);
      genGradeSelect.disabled = true;
    }else{
      genGradeSelect.disabled = false;
      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "— Selecciona un grado —";
      genGradeSelect.appendChild(placeholder);
      gradesWithData.forEach(g => {
        const opt = document.createElement("option");
        opt.value = g.id;
        opt.textContent = g.label;
        genGradeSelect.appendChild(opt);
      });
      if(gradesWithData.some(g => g.id === previousValue)) genGradeSelect.value = previousValue;
    }
    populateGenScenarioSelect();
  }

  function populateGenScenarioSelect(){
    const gradeId = genGradeSelect.value;
    const entries = programs[gradeId] || [];
    const scenarios = [...new Set(entries.map(e => e.scenario).filter(Boolean))];

    genScenarioSelect.innerHTML = "";
    const placeholder = document.createElement("option");
    placeholder.value = "";
    placeholder.textContent = scenarios.length ? "— Selecciona un scenario —" : "— Selecciona un grado primero —";
    genScenarioSelect.appendChild(placeholder);
    scenarios.forEach(s => {
      const opt = document.createElement("option");
      opt.value = s;
      opt.textContent = s;
      genScenarioSelect.appendChild(opt);
    });
    genScenarioSelect.disabled = scenarios.length === 0;
    populateGenThemeSelect();
  }

  function populateGenThemeSelect(){
    const gradeId = genGradeSelect.value;
    const scenario = genScenarioSelect.value;
    const entries = (programs[gradeId] || []).filter(e => e.scenario === scenario);
    const themes = [...new Set(entries.map(e => e.theme).filter(Boolean))];

    genThemeSelect.innerHTML = "";
    const placeholder = document.createElement("option");
    placeholder.value = "";
    placeholder.textContent = themes.length ? "— Selecciona un theme —" : "— Selecciona un scenario primero —";
    genThemeSelect.appendChild(placeholder);
    themes.forEach(t => {
      const opt = document.createElement("option");
      opt.value = t;
      opt.textContent = t;
      genThemeSelect.appendChild(opt);
    });
    genThemeSelect.disabled = themes.length === 0;
    updateCompetencesPreview();
  }

  function updateCompetencesPreview(){
    const gradeId = genGradeSelect.value;
    const scenario = genScenarioSelect.value;
    const theme = genThemeSelect.value;
    const entry = (programs[gradeId] || []).find(e => e.scenario === scenario && e.theme === theme);

    if(entry && entry.communicativeCompetences){
      currentCompetences = entry.communicativeCompetences;
      competencesPreview.textContent = currentCompetences;
      competencesPreview.classList.remove("placeholder");
    }else{
      currentCompetences = "";
      competencesPreview.textContent = "Se mostrarán aquí al elegir grado, scenario y theme.";
      competencesPreview.classList.add("placeholder");
    }
    updateGenerateBtnState();
  }

  function updateGenerateBtnState(){
    generateBtn.disabled = !(genGradeSelect.value && genScenarioSelect.value && genThemeSelect.value);
  }

  genGradeSelect.addEventListener("change", populateGenScenarioSelect);
  genScenarioSelect.addEventListener("change", populateGenThemeSelect);
  genThemeSelect.addEventListener("change", updateCompetencesPreview);

  // ---------- dialogue generation ----------

  turnsRange.addEventListener("input", () => { turnsValue.textContent = turnsRange.value; });

  function setGenerating(isLoading, isRegenerate){
    if(isRegenerate){
      regenerateBtn.disabled = isLoading;
      regenerateBtn.textContent = isLoading ? "Generating..." : "↻ Regenerate";
    }else{
      generateBtn.disabled = isLoading || !(genGradeSelect.value && genScenarioSelect.value && genThemeSelect.value);
      generateBtn.textContent = isLoading ? "Generating..." : "Generate Dialogue";
    }
  }

  async function generateDialogue(isRegenerate){
    const scenario = genScenarioSelect.value;
    const theme = genThemeSelect.value;
    const speakerAName = speakerA.value.trim() || "Student A";
    const speakerBName = speakerB.value.trim() || "Student B";
    const turns = parseInt(turnsRange.value, 10);

    const system = "You are an ESL materials writer creating Speaking and Reading dialogues for Panama's MEDUCA English curriculum. " +
      "Write entirely in English, at a level appropriate for the given scenario, theme and competences. " +
      "The dialogue must alternate between exactly two speakers, named \"" + speakerAName + "\" and \"" + speakerBName + "\", " +
      "with exactly " + turns + " lines from each speaker (" + (turns * 2) + " lines total), starting with \"" + speakerAName + "\". " +
      "Base the content tightly on the Scenario, Theme and Communicative Competences provided by the user. " +
      "Keep each line natural, conversational, and classroom-appropriate. " +
      "Respond ONLY with a single valid JSON object, no markdown code fences, no commentary. " +
      "Shape: {\"title\":\"...\",\"lines\":[{\"speaker\":\"" + speakerAName + "\",\"text\":\"...\"},{\"speaker\":\"" + speakerBName + "\",\"text\":\"...\"}]}";

    let userText = "Scenario: " + scenario + "\nTheme: " + theme + "\nCommunicative Competences: " + currentCompetences;
    if(isRegenerate){
      userText += "\n\nProvide a fresh, different version from any previous attempt: vary the situation details, vocabulary and phrasing while respecting all the same parameters.";
    }

    setGenerating(true, isRegenerate);
    try{
      const raw = await callClaude(system, userText, 1000);
      const json = safeParseJson(raw);
      if(!json.lines || !Array.isArray(json.lines) || json.lines.length === 0){
        throw new Error("La IA no devolvió un diálogo válido.");
      }
      lastDialogue = json;
      renderDialogue(json);
      outputCard.hidden = false;
      outputCard.scrollIntoView({ behavior: "smooth", block: "start" });
    }catch(err){
      showError(err.message || "No se pudo generar el diálogo.");
    }finally{
      setGenerating(false, isRegenerate);
    }
  }

  function renderDialogue(data){
    const speakerAName = speakerA.value.trim() || "Student A";
    el("dialogueTitle").textContent = data.title || "";

    const container = el("scriptOutput");
    container.innerHTML = "";

    data.lines.forEach((line, index) => {
      const isA = line.speaker === speakerAName;
      const turnDiv = document.createElement("div");
      turnDiv.className = "turn " + (isA ? "speaker-a" : "speaker-b");

      const cue = document.createElement("div");
      cue.className = "cue";
      cue.textContent = String(index + 1).padStart(2, "0");

      const body = document.createElement("div");
      body.className = "turn-body";

      const tag = document.createElement("div");
      tag.className = "speaker-tag";
      tag.textContent = line.speaker;

      const text = document.createElement("div");
      text.className = "turn-text";
      text.textContent = line.text;

      body.appendChild(tag);
      body.appendChild(text);
      turnDiv.appendChild(cue);
      turnDiv.appendChild(body);
      container.appendChild(turnDiv);
    });
  }

  generateBtn.addEventListener("click", () => generateDialogue(false));
  regenerateBtn.addEventListener("click", () => generateDialogue(true));

  // ---------- copy (clipboard -> execCommand -> manual modal) ----------

  function buildDialoguePlainText(){
    let text = (lastDialogue.title ? lastDialogue.title + "\n\n" : "");
    lastDialogue.lines.forEach(line => { text += line.speaker + ": " + line.text + "\n"; });
    return text;
  }

  function flashCopied(){
    copyBtn.textContent = "Copied!";
    setTimeout(() => { copyBtn.textContent = "Copy text"; }, 1500);
  }

  function execCommandCopy(text){
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.top = "0";
    ta.style.left = "0";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    let ok = false;
    try{ ok = document.execCommand("copy"); }catch(e){ ok = false; }
    document.body.removeChild(ta);
    return ok;
  }

  function showManualCopyBox(text){
    const backdrop = document.createElement("div");
    backdrop.className = "copy-backdrop";
    const box = document.createElement("div");
    box.className = "copy-box";
    const p = document.createElement("p");
    p.textContent = "No se pudo copiar automáticamente. El texto ya está seleccionado — mantén presionado y elige \"Copiar\".";
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.readOnly = true;
    const closeBtn = document.createElement("button");
    closeBtn.className = "close-copy";
    closeBtn.textContent = "Cerrar";
    closeBtn.addEventListener("click", () => document.body.removeChild(backdrop));
    box.appendChild(p);
    box.appendChild(ta);
    box.appendChild(closeBtn);
    backdrop.appendChild(box);
    document.body.appendChild(backdrop);
    ta.focus();
    ta.select();
  }

  function copyDialogueText(){
    if(!lastDialogue) return;
    const text = buildDialoguePlainText();
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(flashCopied).catch(() => {
        if(execCommandCopy(text)){ flashCopied(); } else { showManualCopyBox(text); }
      });
    }else{
      if(execCommandCopy(text)){ flashCopied(); } else { showManualCopyBox(text); }
    }
  }

  copyBtn.addEventListener("click", copyDialogueText);

  // ---------- session reset (does NOT delete stored programs) ----------

  resetBtn.addEventListener("click", () => {
    outputCard.hidden = true;
    lastDialogue = null;
    el("scriptOutput").innerHTML = "";
    el("dialogueTitle").textContent = "";
    genGradeSelect.value = "";
    populateGenScenarioSelect();
    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage({ type: "CLEAR_CACHE" });
    }
  });

  // ---------- PWA: install prompt + service worker ----------

  const installBtn = el("installBtn");
  let deferredInstallPrompt = null;

  window.addEventListener("beforeinstallprompt", (event) => {
    event.preventDefault();
    deferredInstallPrompt = event;
    installBtn.hidden = false;
  });

  installBtn.addEventListener("click", async () => {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    installBtn.hidden = true;
  });

  window.addEventListener("appinstalled", () => {
    installBtn.hidden = true;
  });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {
        // Registration can fail if the file isn't hosted (e.g. opened
        // directly from disk) — the app still works without it.
      });
    });
  }

  // ---------- init ----------

  initPrograms();
})();
</script>
