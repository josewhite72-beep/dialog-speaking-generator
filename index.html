<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Diálogos · Speaking &amp; Reading Generator</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B2A4A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Diálogos">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2A4A;
    --paper:#F2EFE4;
    --paper-alt:#E7E2D2;
    --mustard:#C08A1E;
    --teal:#2C6C5F;
    --charcoal:#232323;
    --error:#A8402A;
    --line:rgba(27,42,74,.16);
    --radius:6px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--charcoal);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .app{
    max-width:680px;
    margin:0 auto;
    padding:0 16px 60px;
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:22px 4px 18px;
    border-bottom:1px solid var(--line);
    margin-bottom:20px;
  }
  .topbar h1{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:28px;
    margin:0;
    color:var(--ink);
    letter-spacing:-0.01em;
  }
  .topbar h1 span{color:var(--mustard);}
  .topbar .subtitle{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--ink);
    opacity:.55;
    display:block;
    margin-top:2px;
    letter-spacing:.02em;
  }
  #resetBtn, #installBtn{
    background:none;
    border:1px solid var(--line);
    border-radius:var(--radius);
    width:42px;height:42px;
    font-size:18px;
    cursor:pointer;
    color:var(--ink);
  }
  #resetBtn:active, #installBtn:active{background:var(--paper-alt);}
  .topbar-actions{display:flex; gap:8px;}

  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px 18px;
    margin-bottom:16px;
  }
  .card h2{
    font-family:'Fraunces',serif;
    font-size:16px;
    font-weight:600;
    margin:0 0 4px;
    color:var(--ink);
    display:flex;
    align-items:baseline;
    gap:8px;
  }
  .card h2 .step-num{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--mustard);
    font-weight:600;
  }
  .hint{
    font-size:13px;
    color:var(--ink);
    opacity:.65;
    margin:6px 0 14px;
    line-height:1.4;
  }

  label{
    display:block;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.04em;
    color:var(--ink);
    opacity:.75;
    margin:14px 0 6px;
  }
  label:first-of-type{margin-top:0;}

  textarea, input[type="text"], select{
    width:100%;
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    color:var(--charcoal);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:10px 12px;
    background:var(--paper);
    resize:vertical;
  }
  select{appearance:auto;}
  textarea{min-height:56px; line-height:1.45;}
  textarea:focus, input:focus, select:focus{outline:2px solid var(--teal); outline-offset:1px;}

  input[type="file"]{
    width:100%;
    font-size:13.5px;
    font-family:'Inter',sans-serif;
    padding:10px 0;
  }

  .status{
    margin-top:12px;
    font-size:13px;
    font-family:'JetBrains Mono',monospace;
    color:var(--teal);
    min-height:16px;
  }
  .status.error{color:var(--error);}

  .speakers-row{
    display:flex;
    gap:12px;
  }
  .speakers-row > div{flex:1;}
  .speakers-row label{margin-top:0;}

  input[type="range"]{
    width:100%;
    accent-color:var(--mustard);
    margin-top:6px;
  }
  .turns-label{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  .turns-label #turnsValue{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--mustard);
    font-weight:600;
  }

  button.btn-primary{
    width:100%;
    margin-top:20px;
    background:var(--ink);
    color:#fff;
    border:none;
    border-radius:var(--radius);
    padding:14px;
    font-family:'Inter',sans-serif;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    min-height:48px;
  }
  button.btn-primary:active{background:#14203a;}
  button.btn-primary:disabled{opacity:.45;cursor:not-allowed;}

  .dialogue-title{
    font-family:'Fraunces',serif;
    font-size:18px;
    font-weight:600;
    color:var(--ink);
    margin-bottom:16px;
  }

  .script{
    border-left:2px solid var(--line);
    padding-left:0;
  }
  .turn{
    display:flex;
    gap:12px;
    padding:10px 0 10px 14px;
    border-left:3px solid transparent;
    margin-left:-2px;
  }
  .turn.speaker-a{border-left-color:var(--mustard);}
  .turn.speaker-b{border-left-color:var(--teal);}
  .cue{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--ink);
    opacity:.4;
    padding-top:2px;
    min-width:20px;
  }
  .turn-body{flex:1;}
  .speaker-tag{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.04em;
    display:inline-block;
    margin-bottom:3px;
  }
  .speaker-a .speaker-tag{color:var(--mustard);}
  .speaker-b .speaker-tag{color:var(--teal);}
  .turn-text{
    font-family:'Fraunces',serif;
    font-size:15.5px;
    line-height:1.5;
    color:var(--charcoal);
  }

  .actions{
    display:flex;
    gap:10px;
    margin-top:20px;
  }
  .actions button{
    flex:1;
    background:#fff;
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:12px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    font-weight:500;
    color:var(--ink);
    cursor:pointer;
    min-height:44px;
  }
  .actions button:active{background:var(--paper-alt);}

  .error-banner{
    background:#fff;
    border:1px solid var(--error);
    color:var(--error);
    border-radius:var(--radius);
    padding:12px 14px;
    font-size:13px;
    margin-bottom:16px;
  }

  .status-list{
    list-style:none;
    padding:0;
    margin:14px 0 0;
  }
  .status-list li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:9px 0;
    border-bottom:1px solid var(--line);
    font-size:13.5px;
  }
  .status-list li:last-child{border-bottom:none;}
  .status-list .grade-name{font-weight:500;color:var(--ink);}
  .status-list .count{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--teal);
    margin-right:auto;
    margin-left:10px;
  }
  .status-list .count.empty{color:var(--ink);opacity:.35;}
  .status-list .delete-grade{
    background:none;
    border:none;
    color:var(--error);
    cursor:pointer;
    font-size:12.5px;
    font-family:'JetBrains Mono',monospace;
    padding:4px 6px;
  }

  .review-entry{
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 14px 6px;
    margin-bottom:12px;
    position:relative;
  }
  .review-entry .remove-entry{
    position:absolute;
    top:10px;
    right:10px;
    background:none;
    border:none;
    color:var(--error);
    cursor:pointer;
    font-size:15px;
    line-height:1;
  }
  .add-entry-btn{
    width:100%;
    background:#fff;
    border:1px dashed var(--line);
    border-radius:var(--radius);
    padding:11px;
    font-size:13px;
    color:var(--ink);
    cursor:pointer;
    margin-top:4px;
  }
  .save-review-btn{
    width:100%;
    margin-top:14px;
    background:var(--teal);
    color:#fff;
    border:none;
    border-radius:var(--radius);
    padding:13px;
    font-size:14.5px;
    font-weight:600;
    cursor:pointer;
    min-height:46px;
  }

  .competences-preview{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:10px 12px;
    font-size:13.5px;
    color:var(--charcoal);
    min-height:20px;
    margin-top:6px;
    line-height:1.4;
  }
  .competences-preview.placeholder{opacity:.4;font-style:italic;}

  [hidden]{display:none !important;}

  .copy-backdrop{
    position:fixed;
    inset:0;
    background:rgba(27,42,74,.55);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:50;
  }
  .copy-box{
    background:#fff;
    border-radius:var(--radius);
    padding:18px;
    width:100%;
    max-width:480px;
  }
  .copy-box p{
    font-size:13px;
    color:var(--ink);
    margin:0 0 10px;
    font-family:'Inter',sans-serif;
  }
  .copy-box textarea{
    width:100%;
    min-height:200px;
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
  }
  .copy-box .close-copy{
    margin-top:12px;
    width:100%;
    background:var(--ink);
    color:#fff;
    border:none;
    border-radius:var(--radius);
    padding:12px;
    font-size:14px;
    cursor:pointer;
    min-height:44px;
  }

  @media print{
    .topbar, .actions, .error-banner, #generateCard{display:none !important;}
    body{background:#fff;}
    .card{border:none;padding:0;}
  }
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div>
      <h1>Diálogos<span>.</span></h1>
      <span class="subtitle">SPEAKING &amp; READING · MEDUCA · PREK, K–6</span>
    </div>
    <div class="topbar-actions">
      <button id="installBtn" title="Instalar app" hidden>⬇</button>
      <button id="resetBtn" title="Limpiar diálogo generado">🔄</button>
    </div>
  </div>

  <div id="errorBanner" class="error-banner" hidden></div>

  <main>
    <section class="card" id="generateCard">
      <h2><span class="step-num">01</span> Generar diálogo</h2>
      <p class="hint">Los programas oficiales de MEDUCA (PreK a 6°) ya vienen cargados de fábrica. Elige grado, scenario y theme para generar el diálogo.</p>

      <label for="genGradeSelect">Grado</label>
      <select id="genGradeSelect"></select>

      <label for="genScenarioSelect">Scenario</label>
      <select id="genScenarioSelect"><option value="">— Selecciona un grado primero —</option></select>

      <label for="genThemeSelect">Theme</label>
      <select id="genThemeSelect"><option value="">— Selecciona un scenario primero —</option></select>

      <label>Communicative Competences</label>
      <div class="competences-preview placeholder" id="competencesPreview">Se mostrarán aquí al elegir grado, scenario y theme.</div>

      <div class="speakers-row" style="margin-top:16px;">
        <div>
          <label for="speakerA">Interlocutor A</label>
          <input type="text" id="speakerA" value="Student A">
        </div>
        <div>
          <label for="speakerB">Interlocutor B</label>
          <input type="text" id="speakerB" value="Student B">
        </div>
      </div>

      <div class="turns-label">
        <label for="turnsRange" style="margin:0;">Intervenciones por interlocutor</label>
        <span id="turnsValue">6</span>
      </div>
      <input type="range" id="turnsRange" min="3" max="12" value="6" step="1">

      <button class="btn-primary" id="generateBtn" disabled>Generate Dialogue</button>
    </section>

    <section class="card" id="outputCard" hidden>
      <h2><span class="step-num">02</span> Diálogo</h2>
      <div class="dialogue-title" id="dialogueTitle"></div>
      <div class="script" id="scriptOutput"></div>
      <div class="actions">
        <button id="regenerateBtn">↻ Regenerate</button>
        <button id="copyBtn">Copy text</button>
      </div>
    </section>
  </main>
</div>

<script>
(function(){
  "use strict";

  const MODEL = "claude-sonnet-4-6";
  const GRADES = [
    { id: "prek", label: "PreK" },
    { id: "k", label: "Kínder" },
    { id: "1", label: "1° Grado" },
    { id: "2", label: "2° Grado" },
    { id: "3", label: "3° Grado" },
    { id: "4", label: "4° Grado" },
    { id: "5", label: "5° Grado" },
    { id: "6", label: "6° Grado" }
  ];

  // Built-in MEDUCA programs (PreK-6), extracted from the official curriculum PDFs.
  const BUILTIN_PROGRAMS = {"prek":[{"scenario":"Scenario 1: Meeting New Friends","theme":"Meeting My Friends","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Subject + Verb (e.g., \"I am [name].\"); 2. WH-questions (e.g., \"What is your name?\"); 3. Yes/No Questions (e.g., \"Are you Mariana?\"). Recommended Vocabulary — Nouns: friend, teacher, name, class. Verbs: say, is, play, wave, meet. Adjectives: nice, happy. Adverb: Please. Interjections: hello, goodbye, thank you. Pronunciation & Phonemic Awareness — Pronunciation: Syllable stress in \"friends\" and \"goodbye\". Phonemic awareness: Initial /f/ in \"friend,\" /g/ in \"goodbye,\" and environmental sounds (e.g., voices saying \"hello\", raindrops falling, dogs barking).\n\nPragmatic Competences:\nExchanging greetings: Using \"hello\" and \"goodbye\" in simple interactions with peers and teachers. Using polite expressions: Saying \"please\" and \"thank you\" when interacting with others.\n\nSociolinguistic Competences:\nPoliteness in greetings: Saying \"hello,\" \"goodbye,\" \"please,\" \"thank you\"."},{"scenario":"Scenario 1: Meeting New Friends","theme":"Saying Please and Thank You","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Subject + Verb (e.g., \"I am [name].\"); 2. WH-questions (e.g., \"What is your name?\"); 3. Yes/No Questions (e.g., \"Are you Mariana?\"). Recommended Vocabulary — Nouns: friend, teacher, name, class. Verbs: say, is, play, wave, meet. Adjectives: nice, happy. Adverb: Please. Interjections: hello, goodbye, thank you. Pronunciation & Phonemic Awareness — Pronunciation: Syllable stress in \"friends\" and \"goodbye\". Phonemic awareness: Initial /f/ in \"friend,\" /g/ in \"goodbye,\" and environmental sounds (e.g., voices saying \"hello\", raindrops falling, dogs barking).\n\nPragmatic Competences:\nExchanging greetings: Using \"hello\" and \"goodbye\" in simple interactions with peers and teachers. Using polite expressions: Saying \"please\" and \"thank you\" when interacting with others.\n\nSociolinguistic Competences:\nPoliteness in greetings: Saying \"hello,\" \"goodbye,\" \"please,\" \"thank you\"."},{"scenario":"Scenario 2: Exploring Our Classroom","theme":"Things in My Classroom","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Yes/No questions (e.g., \"Is this your pencil?\"); 2. Prepositions (e.g., \"The book is on the table.\"); 3. WH-questions (e.g., \"What color is it?\"). Recommended Vocabulary — Nouns: pencil, book, chair, desk, crayon, board, table, bag, desk. Verbs: sit, stand, read, write, count, find. Adjectives: red, blue, yellow, tall, short. Prepositions: on, under, in, next to. Pronunciation & Phonemic Awareness — Pronunciation: /p/ in \"pencil,\" /b/ in \"book\". Initial sounds: /tʃ/ in \"chair\" and /ʃ/ in \"short\". Environmental sounds: school bell, chairs moving, voices greeting, and drawers opening.\n\nPragmatic Competences:\nIdentifying classroom objects and colors: Responding to \"What is this?\" by naming familiar items (e.g., \"pencil\") and \"What color is this?\" by naming familiar colors (e.g., \"red\"). Following directions: Pointing to or retrieve items based on instructions (e.g., \"Pick up the book.\").\n\nSociolinguistic Competences:\nPoliteness: Expressing and showing gratitude by saying \"thank you\" after receiving a snack or sharing toys."},{"scenario":"Scenario 2: Exploring Our Classroom","theme":"Colors in My Classroom","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Yes/No questions (e.g., \"Is this your pencil?\"); 2. Prepositions (e.g., \"The book is on the table.\"); 3. WH-questions (e.g., \"What color is it?\"). Recommended Vocabulary — Nouns: pencil, book, chair, desk, crayon, board, table, bag, desk. Verbs: sit, stand, read, write, count, find. Adjectives: red, blue, yellow, tall, short. Prepositions: on, under, in, next to. Pronunciation & Phonemic Awareness — Pronunciation: /p/ in \"pencil,\" /b/ in \"book\". Initial sounds: /tʃ/ in \"chair\" and /ʃ/ in \"short\". Environmental sounds: school bell, chairs moving, voices greeting, and drawers opening.\n\nPragmatic Competences:\nIdentifying classroom objects and colors: Responding to \"What is this?\" by naming familiar items (e.g., \"pencil\") and \"What color is this?\" by naming familiar colors (e.g., \"red\"). Following directions: Pointing to or retrieve items based on instructions (e.g., \"Pick up the book.\").\n\nSociolinguistic Competences:\nPoliteness: Expressing and showing gratitude by saying \"thank you\" after receiving a snack or sharing toys."},{"scenario":"Scenario 3: Me and My Family","theme":"This Is Me!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Pronouns (e.g., \"I, you, he, she, it\"); 2. WH-questions (e.g., \"Who is it?\"); 3. Possessive adjectives (e.g., \"This is my mom.\"). Recommended Vocabulary — Nouns: mom, dad, brother, sister, baby, family, house, dog, cat. Verbs: live, love, play, go, see. Adjectives: happy, sad, young, new, old. Possessive adjectives: my, your, his, her. Pronunciation & Phonemic Awareness — Pronunciation: /p/ in \"play\" and /b/ in \"brother\". Phonemic awareness: Identification of the initial sounds in words such as /m/ in \"mom\" and /s/ in \"sister\".\n\nPragmatic Competences:\nNaming family members: Using \"mom,\" \"dad,\" or \"sister\" in response to \"Who is this?\" questions. Describing relationships: Responding to \"Who is in your family?\" by naming family members.\n\nSociolinguistic Competences:\nRespecting family roles: Using respectful terms when referring to family members (e.g., \"Mom and Dad\")."},{"scenario":"Scenario 3: Me and My Family","theme":"My Family","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Pronouns (e.g., \"I, you, he, she, it\"); 2. WH-questions (e.g., \"Who is it?\"); 3. Possessive adjectives (e.g., \"This is my mom.\"). Recommended Vocabulary — Nouns: mom, dad, brother, sister, baby, family, house, dog, cat. Verbs: live, love, play, go, see. Adjectives: happy, sad, young, new, old. Possessive adjectives: my, your, his, her. Pronunciation & Phonemic Awareness — Pronunciation: /p/ in \"play\" and /b/ in \"brother\". Phonemic awareness: Identification of the initial sounds in words such as /m/ in \"mom\" and /s/ in \"sister\".\n\nPragmatic Competences:\nNaming family members: Using \"mom,\" \"dad,\" or \"sister\" in response to \"Who is this?\" questions. Describing relationships: Responding to \"Who is in your family?\" by naming family members.\n\nSociolinguistic Competences:\nRespecting family roles: Using respectful terms when referring to family members (e.g., \"Mom and Dad\")."},{"scenario":"Scenario 4: Let's Eat!","theme":"I Love Fruit!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Subject + Verb (e.g., \"I like bananas.\"); 2. WH-questions (e.g., \"What is this?\"); 3. Adjectives (e.g., \"red apples\"). Recommended Vocabulary — Nouns: apple, banana, orange, papaya, carrot, grape, potato, tomato, lemon, fruit, vegetable. Verbs: eat, like, love, smell, taste. Adjectives: red, yellow, orange, sweet, sour, yummy, hungry. Pronunciation & Phonemic Awareness — Pronunciation: Initial /æ/ in \"apple\" and /b/ in \"banana\". Phonemic awareness: Final /t/ in \"fruit\" and \"carrot\".\n\nPragmatic Competences:\nExpressing preferences: Answering \"Do you like…?\" with \"Yes\" or \"No\" when discussing food items. Identifying food items: Responding to the question \"What is this?\" with the correct name (e.g., \"apple\").\n\nSociolinguistic Competences:\nPoliteness in sharing: Saying \"please\" and \"thank you\" when sharing food."},{"scenario":"Scenario 4: Let's Eat!","theme":"I Eat Vegetables!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Subject + Verb (e.g., \"I like bananas.\"); 2. WH-questions (e.g., \"What is this?\"); 3. Adjectives (e.g., \"red apples\"). Recommended Vocabulary — Nouns: apple, banana, orange, papaya, carrot, grape, potato, tomato, lemon, fruit, vegetable. Verbs: eat, like, love, smell, taste. Adjectives: red, yellow, orange, sweet, sour, yummy, hungry. Pronunciation & Phonemic Awareness — Pronunciation: Initial /æ/ in \"apple\" and /b/ in \"banana\". Phonemic awareness: Final /t/ in \"fruit\" and \"carrot\".\n\nPragmatic Competences:\nExpressing preferences: Answering \"Do you like…?\" with \"Yes\" or \"No\" when discussing food items. Identifying food items: Responding to the question \"What is this?\" with the correct name (e.g., \"apple\").\n\nSociolinguistic Competences:\nPoliteness in sharing: Saying \"please\" and \"thank you\" when sharing food."},{"scenario":"Scenario 5: Numbers Around Me","theme":"Let's Count to Five!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Counting quantities (e.g., \"How many apples?\"); 2. Simple phrases (e.g., \"two apples\"); 3. Imperatives (e.g., \"Pick up two toys.\"). Recommended Vocabulary — Nouns: number, ball, car, toy, TV. Verbs: count, find, see, play, read, pick up, show. Adjectives: big, small, red, blue, green. Numbers: one, two, three, four, five. Pronunciation & Phonemic Awareness — Pronunciation: Initial sound /n/ in \"number\" and /b/ in \"ball\". Phonemic awareness: Final sound /s/ in \"books\" and /z/ in \"toys\".\n\nPragmatic Competences:\nCounting objects: Using fingers to count to five in response to questions. Confirming quantity: Answering \"How many?\" with simple numbers (e.g., \"two pencils\").\n\nSociolinguistic Competences:\nCounting in social settings: Counting objects during playtime with peers."},{"scenario":"Scenario 5: Numbers Around Me","theme":"How Many?","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Counting quantities (e.g., \"How many apples?\"); 2. Simple phrases (e.g., \"two apples\"); 3. Imperatives (e.g., \"Pick up two toys.\"). Recommended Vocabulary — Nouns: number, ball, car, toy, TV. Verbs: count, find, see, play, read, pick up, show. Adjectives: big, small, red, blue, green. Numbers: one, two, three, four, five. Pronunciation & Phonemic Awareness — Pronunciation: Initial sound /n/ in \"number\" and /b/ in \"ball\". Phonemic awareness: Final sound /s/ in \"books\" and /z/ in \"toys\".\n\nPragmatic Competences:\nCounting objects: Using fingers to count to five in response to questions. Confirming quantity: Answering \"How many?\" with simple numbers (e.g., \"two pencils\").\n\nSociolinguistic Competences:\nCounting in social settings: Counting objects during playtime with peers."},{"scenario":"Scenario 6: Fun with Letters","theme":"The A-B-Cs","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Letters & words (e.g., \"A is for apple.\"); 2. Present simple (e.g., \"This is a banana.\"); 3. WH-Questions (e.g., \"What is this?\"). Recommended Vocabulary — Nouns: coconut, ant, bee, cat, ball, bag, car, bird, cow, chicken, boat, apple. Verbs: eat, see, find, like, play, be (is, are). Adjectives: colors, numbers (1-5). Questions: what. Pronunciation & Phonemic Awareness — Pronunciation: Initial sounds /æ/ in \"apple,\" /b/ in \"banana,\" /k/ in \"coconut\". Phonemic awareness: Recognizing letter sounds (A, B, C).\n\nPragmatic Competences:\nIdentifying letters: Responding to \"What letter is this?\" by naming letters (e.g., \"A\"). Naming familiar items: Saying \"A is for apple\" or \"B is for ball\" when asked about letters.\n\nSociolinguistic Competences:\nRecognizing the alphabet: Understanding letters as the building blocks of words."},{"scenario":"Scenario 6: Fun with Letters","theme":"Apple, Banana, Coconut","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Letters & words (e.g., \"A is for apple.\"); 2. Present simple (e.g., \"This is a banana.\"); 3. WH-Questions (e.g., \"What is this?\"). Recommended Vocabulary — Nouns: coconut, ant, bee, cat, ball, bag, car, bird, cow, chicken, boat, apple. Verbs: eat, see, find, like, play, be (is, are). Adjectives: colors, numbers (1-5). Questions: what. Pronunciation & Phonemic Awareness — Pronunciation: Initial sounds /æ/ in \"apple,\" /b/ in \"banana,\" /k/ in \"coconut\". Phonemic awareness: Recognizing letter sounds (A, B, C).\n\nPragmatic Competences:\nIdentifying letters: Responding to \"What letter is this?\" by naming letters (e.g., \"A\"). Naming familiar items: Saying \"A is for apple\" or \"B is for ball\" when asked about letters.\n\nSociolinguistic Competences:\nRecognizing the alphabet: Understanding letters as the building blocks of words."},{"scenario":"Scenario 7: Inside My School!","theme":"My Teacher!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Subject + verb (e.g., \"This is my teacher.\"); 2. WH-Questions (e.g., \"What is this?\"); 3. Prepositions (e.g., \"The book is on the table.\"). Recommended Vocabulary — Nouns: classroom, teacher, classmate, principal, toy. Verbs: sit, stand, read, write, learn, ask, play, meet, answer. Adjectives: big, small, clean, new. Demonstrative Adjectives: this, these. Prepositions: in, on, under. Questions: what, where. Interjections: hi, hello. Pronunciation & Phonemic Awareness — Pronunciation: Initial sound /n/ \"new\" /s/ \"sit\". Phonemic awareness: Initial sound /r/ in \"read\" /n/ final in \"learn\".\n\nPragmatic Competences:\nIdentifying people: Answering \"Who is this?\" by saying \"This is my teacher.\" or \"This is my friend.\" Describing Objects and Locations: Responding to \"What is this?\" with \"This is a chair.\" or \"This is a desk.\" \"Where is the book?\" \"It's on the desk.\"\n\nSociolinguistic Competences:\nClassroom interactions: Socially appropriate greetings, such as addressing the principal versus a friend."},{"scenario":"Scenario 7: Inside My School!","theme":"Time for Recess!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Subject + verb (e.g., \"This is my teacher.\"); 2. WH-Questions (e.g., \"What is this?\"); 3. Prepositions (e.g., \"The book is on the table.\"). Recommended Vocabulary — Nouns: classroom, teacher, classmate, principal, toy. Verbs: sit, stand, read, write, learn, ask, play, meet, answer. Adjectives: big, small, clean, new. Demonstrative Adjectives: this, these. Prepositions: in, on, under. Questions: what, where. Interjections: hi, hello. Pronunciation & Phonemic Awareness — Pronunciation: Initial sound /n/ \"new\" /s/ \"sit\". Phonemic awareness: Initial sound /r/ in \"read\" /n/ final in \"learn\".\n\nPragmatic Competences:\nIdentifying people: Answering \"Who is this?\" by saying \"This is my teacher.\" or \"This is my friend.\" Describing Objects and Locations: Responding to \"What is this?\" with \"This is a chair.\" or \"This is a desk.\" \"Where is the book?\" \"It's on the desk.\"\n\nSociolinguistic Competences:\nClassroom interactions: Socially appropriate greetings, such as addressing the principal versus a friend."},{"scenario":"Scenario 8: Panama's Plants and Animals","theme":"It's a Plant.","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Subject + verb (e.g., \"This is a tree.\"); 2. WH-questions (e.g., \"What is it?\"); 3. Present simple (e.g., \"It is a bird.\"). Recommended Vocabulary — Nouns: tree, plant, flower, fish, dog, cat, animal, insect, bird. Verbs: fly, swim, grow, eat, live, be (is, are). Adjectives: tall, small, green, big, little, beautiful. Questions: what, where. Pronoun: it. Pronunciation & Phonemic Awareness — Pronunciation: /t/ in \"tall\" and /f/ in \"fish\". Phonemic awareness: Initial sounds in /k/ in \"cat\" and /b/ in \"bird\".\n\nPragmatic Competences:\nNaming animals and plants: Responding to \"What is this?\" by naming familiar animals or plants (e.g., \"This is a bird.\"). Describing features: Using simple descriptors like \"green\" for trees or \"big\" for animals.\n\nSociolinguistic Competences:\nRespect for nature: Learning about plants and animals found in Panama and showing respect for them."},{"scenario":"Scenario 8: Panama's Plants and Animals","theme":"It's an Animal.","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Subject + verb (e.g., \"This is a tree.\"); 2. WH-questions (e.g., \"What is it?\"); 3. Present simple (e.g., \"It is a bird.\"). Recommended Vocabulary — Nouns: tree, plant, flower, fish, dog, cat, animal, insect, bird. Verbs: fly, swim, grow, eat, live, be (is, are). Adjectives: tall, small, green, big, little, beautiful. Questions: what, where. Pronoun: it. Pronunciation & Phonemic Awareness — Pronunciation: /t/ in \"tall\" and /f/ in \"fish\". Phonemic awareness: Initial sounds in /k/ in \"cat\" and /b/ in \"bird\".\n\nPragmatic Competences:\nNaming animals and plants: Responding to \"What is this?\" by naming familiar animals or plants (e.g., \"This is a bird.\"). Describing features: Using simple descriptors like \"green\" for trees or \"big\" for animals.\n\nSociolinguistic Competences:\nRespect for nature: Learning about plants and animals found in Panama and showing respect for them."}],"k":[{"scenario":"Scenario 1: It's a School Day!","theme":"Let's Listen!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Imperatives (e.g., \"Stand up.\"); 2. Present simple (e.g., \"It is a school.\"); 3. WH-questions (e.g., \"What is it?\"). Recommended Vocabulary — Nouns: child, table, morning, book, music, window, door. Verbs: listen, stand up, jump, touch, open. Adjectives: nice, calm, top, bottom. Preposition: near. Adverb: away. Pronunciation & Phonemic Awareness — Pronunciation: /s/ in \"school\" and /l/ in \"listen\". Phonemic awareness: Syllable stress in \"teacher\" and \"student\", initial sound: /b/ \"book\" /l/ \"listen\" /t/ \"touch\".\n\nPragmatic Competences:\nFollowing instructions: Respond to commands, like \"stand up\" and \"listen\". Describing actions: Using basic words to give an instruction, like \"Please, sit.\" Responding questions: Answering WH-questions like \"What is it?\" and \"Where is the pen?\"\n\nSociolinguistic Competences:\nPoliteness and formality: Use formal language when giving instructions, such as \"Please stand up.\""},{"scenario":"Scenario 1: It's a School Day!","theme":"Stand Up!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Imperatives (e.g., \"Stand up.\"); 2. Present simple (e.g., \"It is a school.\"); 3. WH-questions (e.g., \"What is it?\"). Recommended Vocabulary — Nouns: child, table, morning, book, music, window, door. Verbs: listen, stand up, jump, touch, open. Adjectives: nice, calm, top, bottom. Preposition: near. Adverb: away. Pronunciation & Phonemic Awareness — Pronunciation: /s/ in \"school\" and /l/ in \"listen\". Phonemic awareness: Syllable stress in \"teacher\" and \"student\", initial sound: /b/ \"book\" /l/ \"listen\" /t/ \"touch\".\n\nPragmatic Competences:\nFollowing instructions: Respond to commands, like \"stand up\" and \"listen\". Describing actions: Using basic words to give an instruction, like \"Please, sit.\" Responding questions: Answering WH-questions like \"What is it?\" and \"Where is the pen?\"\n\nSociolinguistic Competences:\nPoliteness and formality: Use formal language when giving instructions, such as \"Please stand up.\""},{"scenario":"Scenario 2: Our Routines","theme":"First, I Sit Down.","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Present simple (e.g., \"This is a pen.\"); 2. Sequencing words with numbers (e.g., \"Step 1, Step 2, Step 3\"); 3. Imperatives (e.g., \"Pick it up.\"). Recommended Vocabulary — Nouns: bag, pen, paper, notebook, calendar, alphabet, door, eraser. Verbs: sit, play, take, put, jump, clap, pick up, draw. Adjectives: big, small, long, short. Prepositions: on, up, down. Interjection: Please. Pronunciation & Phonemic Awareness — Pronunciation: /p/ in \"pick\" and /d/ in \"down\". Phonemic awareness: Recognizing letter sounds (A, B, C, D, E).\n\nPragmatic Competences:\nDescribing daily routines: Use simple language to describe classroom routines with numbers. Following instructions: Respond to routines with actions, such as \"pick up\" by picking up materials after a lesson.\n\nSociolinguistic Competences:\nRoutine interactions: Understanding and following daily routines in class, using polite expressions (e.g., \"Please, pick up the paper.\")."},{"scenario":"Scenario 2: Our Routines","theme":"Pick It Up!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Present simple (e.g., \"This is a pen.\"); 2. Sequencing words with numbers (e.g., \"Step 1, Step 2, Step 3\"); 3. Imperatives (e.g., \"Pick it up.\"). Recommended Vocabulary — Nouns: bag, pen, paper, notebook, calendar, alphabet, door, eraser. Verbs: sit, play, take, put, jump, clap, pick up, draw. Adjectives: big, small, long, short. Prepositions: on, up, down. Interjection: Please. Pronunciation & Phonemic Awareness — Pronunciation: /p/ in \"pick\" and /d/ in \"down\". Phonemic awareness: Recognizing letter sounds (A, B, C, D, E).\n\nPragmatic Competences:\nDescribing daily routines: Use simple language to describe classroom routines with numbers. Following instructions: Respond to routines with actions, such as \"pick up\" by picking up materials after a lesson.\n\nSociolinguistic Competences:\nRoutine interactions: Understanding and following daily routines in class, using polite expressions (e.g., \"Please, pick up the paper.\")."},{"scenario":"Scenario 3: Hold Up Ten Fingers!","theme":"I Can Count!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Quantity + nouns (e.g., \"ten fingers\"); 2. Wh-questions (e.g., \"What number is this?\" \"How many fingers?\"); 3. Yes/No questions (e.g., \"Is this number five?\"). Recommended Vocabulary — Nouns: numbers (1-10), hand, finger, block, pencil, book, crayon, marker, glue, ink, juice. Verbs: count, show, point, hold, match. Adjectives: red, yellow, blue, green, orange, purple, tall, small, short, big. Pronunciation & Phonemic Awareness — Pronunciation: Initial /k/ in \"count\" and /f/ in \"fingers\". Phonemic awareness: Recognizing number sounds (1-10) and recognizing letter sounds (F, G, H, I, J).\n\nPragmatic Competences:\nCounting aloud: Practice counting objects up to ten in response to teacher prompts. Answering quantity questions: Respond to \"how many\" questions with simple numbers (e.g., \"three pencils\").\n\nSociolinguistic Competences:\nEncouraging turn-taking and active listening: Counting objects in small groups, respecting turn-taking and active listening."},{"scenario":"Scenario 3: Hold Up Ten Fingers!","theme":"All the Pencils!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Quantity + nouns (e.g., \"ten fingers\"); 2. Wh-questions (e.g., \"What number is this?\" \"How many fingers?\"); 3. Yes/No questions (e.g., \"Is this number five?\"). Recommended Vocabulary — Nouns: numbers (1-10), hand, finger, block, pencil, book, crayon, marker, glue, ink, juice. Verbs: count, show, point, hold, match. Adjectives: red, yellow, blue, green, orange, purple, tall, small, short, big. Pronunciation & Phonemic Awareness — Pronunciation: Initial /k/ in \"count\" and /f/ in \"fingers\". Phonemic awareness: Recognizing number sounds (1-10) and recognizing letter sounds (F, G, H, I, J).\n\nPragmatic Competences:\nCounting aloud: Practice counting objects up to ten in response to teacher prompts. Answering quantity questions: Respond to \"how many\" questions with simple numbers (e.g., \"three pencils\").\n\nSociolinguistic Competences:\nEncouraging turn-taking and active listening: Counting objects in small groups, respecting turn-taking and active listening."},{"scenario":"Scenario 4: Where Is It?","theme":"Where Is Your Book?","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Prepositions (e.g., \"on the desks\"); 2. WH-Questions for Location (e.g., \"Where is the book?\"); 3. Plural nouns in simple responses (e.g., \"on the desk\" or \"three books\"). Recommended Vocabulary — Nouns: poster, clip, ruler, glue, marker, folder, card, shelf, chart, pen, chalk, key, notebook. Verbs: point, hold, pick, put, draw, write, show, go. Adjectives: large, small. Colors: yellow, red, blue, orange, green, purple. Prepositions: on, in, under. Pronunciation & Phonemic Awareness — Pronunciation: /w/ in \"where\" and /b/ in \"book\". Phonemic awareness: Recognizing letter sounds (K, L, M, N, O).\n\nPragmatic Competences:\nUsing location words: Respond with basic words to location-based questions, using prepositions (e.g., \"The book is on the desk.\"). Following location commands: Move to designated areas in response to instructions (e.g., \"Go to the window.\").\n\nSociolinguistic Competences:\nPolite request: Asking request politely about the location of items (e.g., \"Show me the blue crayon, please\"). Giving information about locations of objects: Responding with basic location phrases (e.g., \"It's on the desk.\")."},{"scenario":"Scenario 4: Where Is It?","theme":"Go to the Window.","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Prepositions (e.g., \"on the desks\"); 2. WH-Questions for Location (e.g., \"Where is the book?\"); 3. Plural nouns in simple responses (e.g., \"on the desk\" or \"three books\"). Recommended Vocabulary — Nouns: poster, clip, ruler, glue, marker, folder, card, shelf, chart, pen, chalk, key, notebook. Verbs: point, hold, pick, put, draw, write, show, go. Adjectives: large, small. Colors: yellow, red, blue, orange, green, purple. Prepositions: on, in, under. Pronunciation & Phonemic Awareness — Pronunciation: /w/ in \"where\" and /b/ in \"book\". Phonemic awareness: Recognizing letter sounds (K, L, M, N, O).\n\nPragmatic Competences:\nUsing location words: Respond with basic words to location-based questions, using prepositions (e.g., \"The book is on the desk.\"). Following location commands: Move to designated areas in response to instructions (e.g., \"Go to the window.\").\n\nSociolinguistic Competences:\nPolite request: Asking request politely about the location of items (e.g., \"Show me the blue crayon, please\"). Giving information about locations of objects: Responding with basic location phrases (e.g., \"It's on the desk.\")."},{"scenario":"Scenario 5: What's that Sound?","theme":"The Cat Says \"Meow\".","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. WH-questions (e.g., \"What sound is this?\"); 2. Present simple (e.g., \"The cat says meow.\"); 3. Exclamations (e.g., \"That's a rooster!\"). Recommended Vocabulary — Nouns: cat, dog, rooster, bird, cow, duck, sheep, horse, fish, pig. Verbs: say, jump, run, fly, swim. Adjectives: loud, quiet, big, small. Animal sounds: bark, meow, quack, woof. Pronunciation & Phonemic Awareness — Pronunciation: /m/ in \"meow\" and /r/ in \"rooster\". Phonemic awareness: Recognizing letters of the alphabet in animal names (e.g., \"C\" in \"cat\", \"D\" in \"dog\") and introducing letters and sounds (P, Q, R).\n\nPragmatic Competences:\nMimicking sounds: Imitate animal or environmental sounds when prompted (e.g., \"meow\" for a cat). Recognizing sounds: Identify common animal sounds during listening activities (e.g., \"moo\" for cow).\n\nSociolinguistic Competences:\nDescribing animal sounds: Identifying and describing different animals, based on their sounds."},{"scenario":"Scenario 5: What's that Sound?","theme":"That's a Rooster!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. WH-questions (e.g., \"What sound is this?\"); 2. Present simple (e.g., \"The cat says meow.\"); 3. Exclamations (e.g., \"That's a rooster!\"). Recommended Vocabulary — Nouns: cat, dog, rooster, bird, cow, duck, sheep, horse, fish, pig. Verbs: say, jump, run, fly, swim. Adjectives: loud, quiet, big, small. Animal sounds: bark, meow, quack, woof. Pronunciation & Phonemic Awareness — Pronunciation: /m/ in \"meow\" and /r/ in \"rooster\". Phonemic awareness: Recognizing letters of the alphabet in animal names (e.g., \"C\" in \"cat\", \"D\" in \"dog\") and introducing letters and sounds (P, Q, R).\n\nPragmatic Competences:\nMimicking sounds: Imitate animal or environmental sounds when prompted (e.g., \"meow\" for a cat). Recognizing sounds: Identify common animal sounds during listening activities (e.g., \"moo\" for cow).\n\nSociolinguistic Competences:\nDescribing animal sounds: Identifying and describing different animals, based on their sounds."},{"scenario":"Scenario 6: Let's Dance!","theme":"Move Around","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Sequential commands with numbers (e.g., \"First, take one step to the side.\" \"Next, take two steps to the side.\"); 2. Simple directive phrases (e.g., \"Move to the front.\" \"Step to the side.\"); 3. Positional commands with prepositions (e.g., \"Stand next to the chair.\" \"Jump over the line.\"). Recommended Vocabulary — Nouns: numbers (one to ten) step, dance, foot, circle, line, voice. Verbs: move, dance, step, spin, turn, twirl, shake, hop, put, jump. Adjectives: fast, slow, big, small. Prepositions: in, out, around, up. Pronunciation & Phonemic Awareness — Pronunciation: /t/ in \"two\" and /d/ in \"dance\". Phonemic awareness: Recognizing letters of the alphabet in familiar words (e.g., \"J\" in \"jump\") and introducing letters and sounds (S, T, U, V).\n\nPragmatic Competences:\nActing out dance commands: Follow simple movement instructions in dance, like \"step forward\" and \"clap\". Reciting action rhymes: Participate in action rhymes or songs, such as \"Head, Shoulders, Knees, and Toes\".\n\nSociolinguistic Competences:\nGroup participation: Engaging in group movements and dances, using polite expressions such as \"after you\" and \"go ahead\"."},{"scenario":"Scenario 6: Let's Dance!","theme":"One Step In, Two Steps Out!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Sequential commands with numbers (e.g., \"First, take one step to the side.\" \"Next, take two steps to the side.\"); 2. Simple directive phrases (e.g., \"Move to the front.\" \"Step to the side.\"); 3. Positional commands with prepositions (e.g., \"Stand next to the chair.\" \"Jump over the line.\"). Recommended Vocabulary — Nouns: numbers (one to ten) step, dance, foot, circle, line, voice. Verbs: move, dance, step, spin, turn, twirl, shake, hop, put, jump. Adjectives: fast, slow, big, small. Prepositions: in, out, around, up. Pronunciation & Phonemic Awareness — Pronunciation: /t/ in \"two\" and /d/ in \"dance\". Phonemic awareness: Recognizing letters of the alphabet in familiar words (e.g., \"J\" in \"jump\") and introducing letters and sounds (S, T, U, V).\n\nPragmatic Competences:\nActing out dance commands: Follow simple movement instructions in dance, like \"step forward\" and \"clap\". Reciting action rhymes: Participate in action rhymes or songs, such as \"Head, Shoulders, Knees, and Toes\".\n\nSociolinguistic Competences:\nGroup participation: Engaging in group movements and dances, using polite expressions such as \"after you\" and \"go ahead\"."},{"scenario":"Scenario 7: I'm Happy.","theme":"I'm Excited!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Simple sentences (e.g., \"I'm happy.\"); 2. WH-questions (e.g., \"How are you?\"); 3. I'm + adjective (e.g., \"I'm excited.\"). Recommended Vocabulary — Nouns: feelings, friend. Verbs: feel, be (am), need, want, rest, play, smile, frown, hug, help. Adjectives: happy, sad, tired, hungry, thirsty, calm, sleepy, excited, sick, warm, angry. Question word: how. Pronunciation & Phonemic Awareness — Pronunciation: /h/ in \"happy\" and /e/ in \"excited\". Phonemic awareness: Recognizing letters of the alphabet in familiar words (e.g., \"E\" in the word \"rest\" or \"H\" in the word \"happy\") and introducing letters and sounds (W, X, Y, Z).\n\nPragmatic Competences:\nExpressing feelings and needs: Express emotions and needs by saying, \"I'm happy.\" or \"I'm tired.\" Responding to questions about feelings: Answering \"How are you?\" with simple \"I'm…\" statements (e.g., \"I'm excited.\").\n\nSociolinguistic Competences:\nDiscussing feelings: Talking about emotions and recognizing others' feelings."},{"scenario":"Scenario 7: I'm Happy.","theme":"How Are You?","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Simple sentences (e.g., \"I'm happy.\"); 2. WH-questions (e.g., \"How are you?\"); 3. I'm + adjective (e.g., \"I'm excited.\"). Recommended Vocabulary — Nouns: feelings, friend. Verbs: feel, be (am), need, want, rest, play, smile, frown, hug, help. Adjectives: happy, sad, tired, hungry, thirsty, calm, sleepy, excited, sick, warm, angry. Question word: how. Pronunciation & Phonemic Awareness — Pronunciation: /h/ in \"happy\" and /e/ in \"excited\". Phonemic awareness: Recognizing letters of the alphabet in familiar words (e.g., \"E\" in the word \"rest\" or \"H\" in the word \"happy\") and introducing letters and sounds (W, X, Y, Z).\n\nPragmatic Competences:\nExpressing feelings and needs: Express emotions and needs by saying, \"I'm happy.\" or \"I'm tired.\" Responding to questions about feelings: Answering \"How are you?\" with simple \"I'm…\" statements (e.g., \"I'm excited.\").\n\nSociolinguistic Competences:\nDiscussing feelings: Talking about emotions and recognizing others' feelings."},{"scenario":"Scenario 8: I Like School!","theme":"I Like Games!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Subject + verb (e.g., \"I like school.\"); 2. Present simple (e.g., \"I like games.\"); 3. Yes/No questions (e.g., \"Do you like it?\" \"Yes.\"). Recommended Vocabulary — Nouns: teacher, art, playground, science, music, math, English. Verbs: enjoy, choose, create, count, build, sing, share, look, write, color. Adjectives: interesting, funny, boring, exciting, happy, sad, favorite, colorful. Pronunciation & Phonemic Awareness — Pronunciation: /l/ in \"like\" and /g/ in \"games\". Phonemic awareness: Recognizing sounds of letters of the alphabet in the words \"math\" and \"games\".\n\nPragmatic Competences:\nExpressing likes and dislikes: Use simple phrases like \"I like…\" or \"I don't like…\" to express preferences. Answering preference questions: Respond to \"Do you like it?\" with \"yes\" or \"no\".\n\nSociolinguistic Competences:\nSharing preferences: Discussing what students like or dislike about school and activities."},{"scenario":"Scenario 8: I Like School!","theme":"I Like Math!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Subject + verb (e.g., \"I like school.\"); 2. Present simple (e.g., \"I like games.\"); 3. Yes/No questions (e.g., \"Do you like it?\" \"Yes.\"). Recommended Vocabulary — Nouns: teacher, art, playground, science, music, math, English. Verbs: enjoy, choose, create, count, build, sing, share, look, write, color. Adjectives: interesting, funny, boring, exciting, happy, sad, favorite, colorful. Pronunciation & Phonemic Awareness — Pronunciation: /l/ in \"like\" and /g/ in \"games\". Phonemic awareness: Recognizing sounds of letters of the alphabet in the words \"math\" and \"games\".\n\nPragmatic Competences:\nExpressing likes and dislikes: Use simple phrases like \"I like…\" or \"I don't like…\" to express preferences. Answering preference questions: Respond to \"Do you like it?\" with \"yes\" or \"no\".\n\nSociolinguistic Competences:\nSharing preferences: Discussing what students like or dislike about school and activities."}],"1":[{"scenario":"Scenario 1: All Week Long!","theme":"Today Is Tuesday!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Noun + verb + noun (e.g., \"Today is Monday.\"); 2. Present simple (e.g., \"It is the weekend.\"); 3. WH-questions (e.g., \"What day is today?\"). Recommended Vocabulary — Nouns: Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday, weekend, day, week. Verbs: be (am, is, are). Adverbs of time: today, tomorrow. Numbers: 1-20. Adjectives: relaxing, exciting, busy, quiet. Prepositions of time: on, before, after. Pronunciation & Phonemic Awareness — Pronunciation: /w/ in \"weekend\" and /d/ in \"day\". Phonemic awareness: Recognizing sounds of letters of the alphabet in familiar words related to days of the week and routines.\n\nPragmatic Competences:\nExchanging questions and answers: Exchanging questions and answers about the current day using simple phrases like \"Today is Monday.\" Using time-related vocabulary: Identifying words for days and weekends by using or pointing to them.\n\nSociolinguistic Competences:\nClassroom schedules: Using polite expressions when talking about the days of the week and routines."},{"scenario":"Scenario 1: All Week Long!","theme":"It's the Weekend.","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Noun + verb + noun (e.g., \"Today is Monday.\"); 2. Present simple (e.g., \"It is the weekend.\"); 3. WH-questions (e.g., \"What day is today?\"). Recommended Vocabulary — Nouns: Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday, weekend, day, week. Verbs: be (am, is, are). Adverbs of time: today, tomorrow. Numbers: 1-20. Adjectives: relaxing, exciting, busy, quiet. Prepositions of time: on, before, after. Pronunciation & Phonemic Awareness — Pronunciation: /w/ in \"weekend\" and /d/ in \"day\". Phonemic awareness: Recognizing sounds of letters of the alphabet in familiar words related to days of the week and routines.\n\nPragmatic Competences:\nExchanging questions and answers: Exchanging questions and answers about the current day using simple phrases like \"Today is Monday.\" Using time-related vocabulary: Identifying words for days and weekends by using or pointing to them.\n\nSociolinguistic Competences:\nClassroom schedules: Using polite expressions when talking about the days of the week and routines."},{"scenario":"Scenario 2: Nice Weather Today!","theme":"It's Sunny!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Present continuous (e.g., \"It is raining.\"); 2. Subject + verb + adjective (e.g., \"It is sunny.\"); 3. WH-questions (e.g., \"What is the weather today?\"). Recommended Vocabulary — Nouns: numbers 1-20, weather, sun, rain, clouds, wind, day, storm, snow. Verbs: rain, shine, blow, fall, clear up. Adjectives: sunny, rainy, cloudy, warm, cold, cool, clear, windy. Pronunciation & Phonemic Awareness — Pronunciation: /s/ in \"sunny\" and /r/ in \"raining\". Phonemic awareness: Initial sound of letter /w/ in the word \"weather\" and identification of sounds of letters of the alphabet in familiar vocabulary (e.g., /r/ in \"rainy\").\n\nPragmatic Competences:\nTalking about weather: Describe simple weather conditions (e.g., \"It is sunny.\") and describe simple reactions to weather (e.g., \"I'm cold.\" or \"I'm hot.\"). Asking questions about weather: Ask basic questions, such as \"What is the weather today?\" to learn about daily conditions.\n\nSociolinguistic Competences:\nWeather conversations: Engaging in simple weather-related conversations."},{"scenario":"Scenario 2: Nice Weather Today!","theme":"It's Raining.","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Present continuous (e.g., \"It is raining.\"); 2. Subject + verb + adjective (e.g., \"It is sunny.\"); 3. WH-questions (e.g., \"What is the weather today?\"). Recommended Vocabulary — Nouns: numbers 1-20, weather, sun, rain, clouds, wind, day, storm, snow. Verbs: rain, shine, blow, fall, clear up. Adjectives: sunny, rainy, cloudy, warm, cold, cool, clear, windy. Pronunciation & Phonemic Awareness — Pronunciation: /s/ in \"sunny\" and /r/ in \"raining\". Phonemic awareness: Initial sound of letter /w/ in the word \"weather\" and identification of sounds of letters of the alphabet in familiar vocabulary (e.g., /r/ in \"rainy\").\n\nPragmatic Competences:\nTalking about weather: Describe simple weather conditions (e.g., \"It is sunny.\") and describe simple reactions to weather (e.g., \"I'm cold.\" or \"I'm hot.\"). Asking questions about weather: Ask basic questions, such as \"What is the weather today?\" to learn about daily conditions.\n\nSociolinguistic Competences:\nWeather conversations: Engaging in simple weather-related conversations."},{"scenario":"Scenario 3: Colors in Our World","theme":"That's a Purple Flower.","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Color + noun (e.g., \"blue bird\"); 2. WH-questions (e.g., \"What color is it?\"); 3. Present simple (e.g., \"It is an orange cat.\"). Recommended Vocabulary — Nouns: bird, flower, cat, tree, house, leaf, sky. Verbs: see, look, fly, sit, grow, count, be (is), color, show. Adjectives: blue, purple, orange, green, red, tall, small. Determiners/Pronouns: that, this. Quantifiers: two, three, four, many. Pronunciation & Phonemic Awareness — Pronunciation: /l/ in \"blue\" and \"leaf\". Phonemic awareness: Identifying initial sounds of letters of the alphabet in common objects and things (e.g., /f/ in \"fish,\" /b/ in \"bird,\" /k/ in \"cat\").\n\nPragmatic Competences:\nRecognizing colors and objects: Identify familiar objects by color (e.g., \"blue bird\" or \"red flower.\"). Describing with colors: Use simple color phrases in sentences (e.g., \"That is a red bird.\"). Counting and identifying colors of objects: Identify and count familiar objects while specifying their color (e.g., \"three blue birds\" or \"two red flowers\").\n\nSociolinguistic Competences:\nObserving surroundings: Describing objects using color and shape while considering their cultural or personal significance."},{"scenario":"Scenario 3: Colors in Our World","theme":"It's an Orange Cat.","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Color + noun (e.g., \"blue bird\"); 2. WH-questions (e.g., \"What color is it?\"); 3. Present simple (e.g., \"It is an orange cat.\"). Recommended Vocabulary — Nouns: bird, flower, cat, tree, house, leaf, sky. Verbs: see, look, fly, sit, grow, count, be (is), color, show. Adjectives: blue, purple, orange, green, red, tall, small. Determiners/Pronouns: that, this. Quantifiers: two, three, four, many. Pronunciation & Phonemic Awareness — Pronunciation: /l/ in \"blue\" and \"leaf\". Phonemic awareness: Identifying initial sounds of letters of the alphabet in common objects and things (e.g., /f/ in \"fish,\" /b/ in \"bird,\" /k/ in \"cat\").\n\nPragmatic Competences:\nRecognizing colors and objects: Identify familiar objects by color (e.g., \"blue bird\" or \"red flower.\"). Describing with colors: Use simple color phrases in sentences (e.g., \"That is a red bird.\"). Counting and identifying colors of objects: Identify and count familiar objects while specifying their color (e.g., \"three blue birds\" or \"two red flowers\").\n\nSociolinguistic Competences:\nObserving surroundings: Describing objects using color and shape while considering their cultural or personal significance."},{"scenario":"Scenario 4: My Family and I","theme":"It's My Family!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Personal pronouns + verb (e.g., \"I am\" \"She is\"); 2. Possessive adjectives (e.g., \"my mom\"); 3. WH-questions (e.g., \"Who is she/he?\"). Recommended Vocabulary — Nouns: family, mom, dad, brother, sister, aunt, uncle, cousin, grandmother, grandfather, pet, home. Verbs: be (is, are), love, live, play, visit, hug, help, talk, smile. Adjectives: old, young, friendly, tall, short. Personal pronouns: she, he. Possessive adjectives: my, your, his, her. Pronunciation & Phonemic Awareness — Pronunciation: /m/ in \"mom\" and /d/ in \"dad\". Phonemic awareness: Matching letter sounds to words, such as /b/ in \"brother\" and /s/ in \"sister\".\n\nPragmatic Competences:\nIntroducing family members: Use simple sentences to describe family (e.g., \"She is my mom.\"). Asking about family: Respond to basic questions about family members (e.g., \"Who is he?\" \"He is my brother.\").\n\nSociolinguistic Competences:\nDescribing Family Roles: Using appropriate language to describe family members and their roles (e.g., \"This is my mother.\")."},{"scenario":"Scenario 4: My Family and I","theme":"She Is My Mom!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Personal pronouns + verb (e.g., \"I am\" \"She is\"); 2. Possessive adjectives (e.g., \"my mom\"); 3. WH-questions (e.g., \"Who is she/he?\"). Recommended Vocabulary — Nouns: family, mom, dad, brother, sister, aunt, uncle, cousin, grandmother, grandfather, pet, home. Verbs: be (is, are), love, live, play, visit, hug, help, talk, smile. Adjectives: old, young, friendly, tall, short. Personal pronouns: she, he. Possessive adjectives: my, your, his, her. Pronunciation & Phonemic Awareness — Pronunciation: /m/ in \"mom\" and /d/ in \"dad\". Phonemic awareness: Matching letter sounds to words, such as /b/ in \"brother\" and /s/ in \"sister\".\n\nPragmatic Competences:\nIntroducing family members: Use simple sentences to describe family (e.g., \"She is my mom.\"). Asking about family: Respond to basic questions about family members (e.g., \"Who is he?\" \"He is my brother.\").\n\nSociolinguistic Competences:\nDescribing Family Roles: Using appropriate language to describe family members and their roles (e.g., \"This is my mother.\")."},{"scenario":"Scenario 5: Colors of Things that Go","theme":"That's a Blue Bus.","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Color + noun (e.g., \"green car\"); 2. WH-questions (e.g., \"What color is the car?\"); 3. Present simple (e.g., \"It is a red bike.\"). Recommended Vocabulary — Nouns: car, bus, bike, truck, train, taxi. Verbs: drive, ride, see, go, stop, be (is). Adjectives: green, blue, red, yellow, purple, small, big, old, new. Demonstratives: this, that. Preposition of place: on. Pronunciation & Phonemic Awareness — Pronunciation: /k/ in \"car\" and /b/ in \"bus\". Phonemic awareness: Initial sound at the beginning of vehicle-related vocabulary (e.g., /k/ in \"car\") and identification of sounds of letters of the alphabet in familiar vocabulary (e.g., /y/ in \"yellow\").\n\nPragmatic Competences:\nDescribing objects: When describing colors in transportation, use phrases that describe vehicles, like \"It is a red bike.\" \"That is a green car.\" or \"It's a blue bus.\" Answering questions about colors and objects: Respond with one-word answers or gestures for vehicles and colors (e.g., \"Point to the blue bus.\").\n\nSociolinguistic Competences:\nNorms of politeness for making requests: Using culturally appropriate norms of politeness in communication when describing transportation (e.g., \"Please, point to the blue car.\")."},{"scenario":"Scenario 5: Colors of Things that Go","theme":"That's a Red Bike.","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Color + noun (e.g., \"green car\"); 2. WH-questions (e.g., \"What color is the car?\"); 3. Present simple (e.g., \"It is a red bike.\"). Recommended Vocabulary — Nouns: car, bus, bike, truck, train, taxi. Verbs: drive, ride, see, go, stop, be (is). Adjectives: green, blue, red, yellow, purple, small, big, old, new. Demonstratives: this, that. Preposition of place: on. Pronunciation & Phonemic Awareness — Pronunciation: /k/ in \"car\" and /b/ in \"bus\". Phonemic awareness: Initial sound at the beginning of vehicle-related vocabulary (e.g., /k/ in \"car\") and identification of sounds of letters of the alphabet in familiar vocabulary (e.g., /y/ in \"yellow\").\n\nPragmatic Competences:\nDescribing objects: When describing colors in transportation, use phrases that describe vehicles, like \"It is a red bike.\" \"That is a green car.\" or \"It's a blue bus.\" Answering questions about colors and objects: Respond with one-word answers or gestures for vehicles and colors (e.g., \"Point to the blue bus.\").\n\nSociolinguistic Competences:\nNorms of politeness for making requests: Using culturally appropriate norms of politeness in communication when describing transportation (e.g., \"Please, point to the blue car.\")."},{"scenario":"Scenario 6: Shapes Around Us","theme":"I See a Rectangle.","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Shape + noun (e.g., \"a square table\"); 2. WH-questions (e.g., \"What shape is it?\"); 3. Present simple (e.g., \"That is a circle.\"). Recommended Vocabulary — Nouns: square, rectangle, circle, triangle, oval, diamond, star. Personal pronoun: it. Verbs: see, look, draw, find, be (is). Adjectives: round, square, tall, long, short, big, small. Demonstratives: this, that. Pronunciation & Phonemic Awareness — Pronunciation: /s/ in \"square\" and /r/ in \"rectangle\". Phonemic awareness: Shape names, initial sounds in names of shapes (e.g., /s/ in \"square\").\n\nPragmatic Competences:\nIdentifying shapes: Recognize and name shapes like squares and circles during classroom activities. Describing shapes: Use simple phrases to talk about shapes (e.g., \"This is a rectangle.\").\n\nSociolinguistic Competences:\nShape and color recognition: Describing characteristics of objects around using the names of shapes and colors (e.g., \"The sun is yellow.\")."},{"scenario":"Scenario 6: Shapes Around Us","theme":"That Is a Circle.","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Shape + noun (e.g., \"a square table\"); 2. WH-questions (e.g., \"What shape is it?\"); 3. Present simple (e.g., \"That is a circle.\"). Recommended Vocabulary — Nouns: square, rectangle, circle, triangle, oval, diamond, star. Personal pronoun: it. Verbs: see, look, draw, find, be (is). Adjectives: round, square, tall, long, short, big, small. Demonstratives: this, that. Pronunciation & Phonemic Awareness — Pronunciation: /s/ in \"square\" and /r/ in \"rectangle\". Phonemic awareness: Shape names, initial sounds in names of shapes (e.g., /s/ in \"square\").\n\nPragmatic Competences:\nIdentifying shapes: Recognize and name shapes like squares and circles during classroom activities. Describing shapes: Use simple phrases to talk about shapes (e.g., \"This is a rectangle.\").\n\nSociolinguistic Competences:\nShape and color recognition: Describing characteristics of objects around using the names of shapes and colors (e.g., \"The sun is yellow.\")."},{"scenario":"Scenario 7: Shapes on Our Plates","theme":"It's a Square Cracker.","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Adjective + noun (e.g., \"round apple\"); 2. WH-questions (e.g., \"What shape is it?\"); 3. Present simple (e.g., \"Oranges are round.\"). Recommended Vocabulary — Nouns: pineapple, lemon, lime, mango, papaya, cracker, banana, food, juice box, snack, meal. Verbs: eat, cut, hold, see, mix. Adjectives: round, square, oval, big, small, healthy, tasty, orange, black, brown, white. Demonstratives: this, that. Pronunciation & Phonemic Awareness — Pronunciation: /r/ in \"round\" and /k/ in \"cracker\". Phonemic awareness: Recognizing sounds of letters of the alphabet in names of shapes and foods (e.g., /æ/ in \"apple\").\n\nPragmatic Competences:\ nces:\nExplaining opinions: Using \"because\" to justify preferences in familiar contexts (e.g., \"I like this street because it has beautiful trees.\")."},{"scenario":"Scenario 2: Helping in the Garden","theme":"The Tomatoes Grow Quickly.","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Present simple + 's' (e.g., \"How often does María water the plants?\" \"María waters the plants every day.\"); 2. Demonstratives (e.g., \"These are tomatoes, and this is a tomato plant.\"); 3. Question forms (e.g., \"How often do you water the plants?\" \"Do you like watering the plants?\"). Recommended Vocabulary — Nouns: garden, plant, tomato, seed, soil, watering can, flower, vegetable, sunlight, hose, rainwater. Verbs: grow, water, plant, harvest, bloom, care, dig, need, put, add, cover. Adjectives: green, bright, healthy, quick, tall. Adverbs of frequency and time expressions: every day, sometimes, always, in the morning. Sequence words: first, second. Pronunciation — Pronunciation: /t/ in \"tomatoes\" and /g/ in \"grow\". Phonemic awareness: Spelling one-syllable or two-syllable words using alphabet knowledge related to gardening (e.g., \"water,\" \"sun,\" and \"soil\").\n\nPragmatic Competences:\nDescribing gardening steps: \"First, plant the seeds.\" Describing routines: \"I water the plants every day.\" Expressing preferences: like, don't like (e.g., \"I like watering the plants, but I don't like digging.\"). Discourse markers: and, but.\n\nSociolinguistic Competences:\nDescribing simple gardening instructions: Using conjunctions to describe gardening tasks (e.g., \"You dig a hole, plant the seed, and water the plant.\")."},{"scenario":"Scenario 2: Helping in the Garden","theme":"These Plants Are from Panama.","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Present simple + 's' (e.g., \"How often does María water the plants?\" \"María waters the plants every day.\"); 2. Demonstratives (e.g.  (e.g., \"Excuse me, how much is it?\")."},{"scenario":"Scenario 4: Visiting the Panama Canal","theme":"The Vessels Are Big Because...","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Present simple with affirmative and interrogative sentences (e.g., \"The Panama Canal connects two oceans.\" \"What does the Panama Canal connect?\"); 2. Present continuous with affirmative and interrogative sentences (e.g., \"Two vessels are crossing the Canal now.\" \"What are the ships transporting?\"); 3. Comparatives and superlatives (e.g., \"That ship is bigger than this yacht.\" \"That vessel is the biggest one.\"). Recommended Vocabulary — Nouns: canal, boat, ocean, bridge, current, vessel, ship, yacht, goods, locks. Verbs: travel, connect, observe, see, visit. Adjectives: important, historic, wide, deep, fascinating, big, small. Prepositions: across, along, through. Pronunciation & Phonemic Awareness — Pronunciation: /k/ in \"Canal\" and /b/ in \"boat\". Phonemic awareness: Spelling words using alphabet knowledge related to familiar words (e.g., \"canal,\" \"vessel,\" and \"wave\"); blending spoken simple onsets and rhymes (e.g., /b/ /oʊt/ \"boat\").\n\nPragmatic Competences:\nDescribing current events (e.g., \"There are many people at the Miraflores Locks today.\" \"They are watching the vessels cross the canal.\"). Comparing things (e.g., \"That black vessel is bigger than the white ship.\"). Describing facts (e.g., \"The Panama Canal connects two oceans.\"). Discourse marker (e.g., \"It connects the Atlantic and the Pacific Oceans.\").\n\nSociolinguistic Competences:\nRespectful Conversations: Engaging in polite exchanges by sharing opinions and inviting others to participate (e.g., \"I like the canal because it is big. What do you think?\" or \"Vessels go through the canal every day. Do you like the canal?\")."},{"scenario":"Scenario 4: Visiting the Panama Canal","theme":"A Vessel Is Crossing!","communicativeCompetences":"Linguisti ions: Using comparatives and superlatives to discuss conservation."},{"scenario":"Scenario 8: Planning Meals for My Family","theme":"Fruits and Vegetables Are Good for You.","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Present simple (e.g., \"Fruits and vegetables are delicious and healthy.\"); 2. Modal verbs (e.g., \"can\"); 3. Countable/uncountable nouns (e.g., \"some rice\"). Recommended Vocabulary — Nouns: breakfast, lunch, dinner, snack, rice, beans, bread, water, juice, mangos, watermelon, tomatoes, lettuce, fruits, vegetables, meal, bowl, cup, fork, knife, spoon. Verbs: cook, boil, bake, fry, steam, cut, slice, eat, enjoy. Adjectives: tasty, salty, sour, sweet, healthy, fresh. Adverbs: often, sometimes. Sequencing adverbs: first, next. Quantifiers: some, many. Pronunciation & Phonemic Awareness — Pronunciation: /v/ in \"vegetables\" and /f/ in \"fruit\". Phonemic Awareness: Introducing simple prefixes and suffixes (-un \"uncountable\" -ing \"cooking\").\n\nPragmatic Competences:\nAsking about food preferences: \"What do you like to eat?\" Sharing meal ideas: \"We can cook pasta.\"\n\nSociolinguistic Competences:\nDescribing food preferences and quantities: Using countable/uncountable nouns to talk about meals (e.g., \"I want to eat some bread.\")."},{"scenario":"Scenario 8: Planning Meals for My Family","theme":"Panama Has Delicious Food!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Present simple (e.g., \"Fruits and vegetables are delicious and healthy.\"); 2. Modal verbs (e.g., \"can\"); 3. Countable/uncountable nouns (e.g., \"some rice\"). Recommended Vocabulary — Nouns: breakfast, lunch, dinner, snack, rice, beans, bread, water, juice, mangos, watermelon, tomatoes, lettuce, fruits, vegetables, meal, bowl, cup, fork, knife, spoon. Verbs: cook, boil, bake, fry, steam, cut, slice, eat, enjoy. Adjectives: tasty, salty, sour, sweet, healthy, fresh. Adverbs: often, sometimes. Sequencing adverbs: first, next. Quantifiers: some, many. Pronunciation & Phonemic Awareness — Pronunciation: /v/ in \"vegetables\" and /f/ in \"fruit\". Phonemic Awareness: Introducing simple prefixes and suffixes (-un \"uncountable\" -ing \"cooking\").\n\nPragmatic Competences:\nAsking about food preferences: \"What do you like to eat?\" Sharing meal ideas: \"We can cook pasta.\"\n\nSociolinguistic Competences:\nDescribing food preferences and quantities: Using countable/uncountable nouns to talk about meals (e.g., \"I want to eat some bread.\")."}],"6":[{"scenario":"Scenario 1: Our Community News","theme":"Reporting From the School!","communicativeCompetences":"Linguistic Competences:\nRecommended Grammatical Features: 1. Past simple tense (e.g., \"The students prepared a mural about the Desfile de las Mil Polleras.\" \"I visited the school fair last weekend.\"); 2. Compound sentences in the past tense with the conjunction \"but\" (e.g., \"I liked the colorful floats during the Carnival parade, but I didn't like the loud music.\"); 3. Adjectives for describing physical appearance (e.g., \"Mr. Ricardo is tall and wears a sombrero pintao.\"). Recommended Vocabulary — Nouns: community, neighborhood, reporter, news, mural, festival, carnival, parade, fair, artisan, tradition, Pollera, sombrero Pintao, cultural event, Carnival float, Carnival Queen, market, banner. Verbs: report, describe, interview, celebrate, participate, decorate, gather, prepare. Adjectives: colorful, traditional, friendly, tall, excited, proud, slender, short, chubby, soft, strong, thin, fat, blond, curly hair, black straight hair, black eyes. Question words: who, what, where, when, why, how. Prepositions of place: in, on, at, near, behind, next to. Prepositions of time: during, before, after. Discourse marker: but. Pronunciation — Pronunciation: Practice pronunciation of past tense -ed endings (/t/, /d/, /ɪd/) (e.g., /d/ in \"moved,\" /t/ in \"liked,\" /ɪd/ in \"wanted\"). Phonemic awarenes
